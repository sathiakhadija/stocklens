<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockLens — Sign In</title>
  <link rel="icon" href="{{ url_for('static', filename='brand-icon.png') }}" type="image/png" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <script>
    document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
  </script>
</head>
<body>

  <nav class="auth-nav">
    <div class="hp-logo">
      <div class="hp-logo-mark">
        <img src="{{ url_for('static', filename='brand-icon.png') }}" alt="" />
      </div>
      <span class="hp-logo-name">Stock<em>Lens</em></span>
    </div>
    <div class="auth-nav-actions">
      <select id="lang-select" class="lang-select" title="Language" data-i18n-title="common.language">
        <option value="en">🇬🇧 EN</option><option value="es">🇪🇸 ES</option><option value="ar">🇸🇦 AR</option><option value="fr">🇫🇷 FR</option><option value="de">🇩🇪 DE</option><option value="pt">🇧🇷 PT</option><option value="hi">🇮🇳 HI</option><option value="ur">🇵🇰 UR</option><option value="tr">🇹🇷 TR</option><option value="bn">🇧🇩 BN</option><option value="zh">🇨🇳 ZH</option><option value="id">🇮🇩 ID</option><option value="th">🇹🇭 TH</option><option value="vi">🇻🇳 VI</option>
      </select>
      <a class="btn btn-out btn-sm" href="/" data-i18n="auth.backHome">← Back to home</a>
    </div>
  </nav>

  <div class="auth-bg">
    <div class="ao1"></div>
    <div class="ao2"></div>

    <div class="auth-card-v3">
      <div class="auth-logo-v3">
        <div class="alm">
          <img src="{{ url_for('static', filename='brand-icon.png') }}" alt="" />
        </div>
        <span class="auth-brand">Stock<em>Lens</em></span>
      </div>

      <div class="auth-tabs">
        <div class="auth-tab on" id="tab-login" onclick="switchTab('login')" data-i18n="auth.signIn">Sign in</div>
        <div class="auth-tab" id="tab-register" onclick="window.location.href='/register'" data-i18n="auth.createAccount">Create account</div>
      </div>

      <!-- Login form -->
      <div id="login-form">
        <div class="fg">
          <label class="fl" data-i18n="auth.email">Email</label>
          <input class="fi" type="email" id="email" placeholder="you@yourshop.com" data-i18n-placeholder="auth.emailPlaceholder" autocomplete="email" />
        </div>
        <div class="fg">
          <label class="fl" data-i18n="auth.password">Password</label>
          <div style="position:relative">
            <input class="fi" type="password" id="password" placeholder="••••••••" data-i18n-placeholder="auth.confirmPasswordPlaceholder" autocomplete="current-password" style="padding-right:36px" />
            <button type="button" id="toggle-password" class="password-icon-btn" tabindex="-1" data-i18n-title="auth.showPassword" aria-label="Show password" data-i18n-aria="auth.showPassword">
              <svg id="password-eye" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button class="auth-submit-v3" id="login-btn" data-i18n="auth.loginSubmit">Sign in to StockLens</button>
        <p class="error-msg" id="error-msg" style="display:none;color:#DC2626;font-size:11px;margin-top:8px;text-align:center"></p>

        <div class="auth-or-v3" data-i18n="auth.or">or</div>
        <button class="auth-submit-v3" id="demo-btn" data-i18n="auth.demo" style="background:linear-gradient(135deg,#F8FAFC,#EEF8F2);color:#1B4332;box-shadow:0 2px 6px rgba(0,0,0,.06);border:.5px solid #E2E8F0;margin-bottom:0">Use demo credentials</button>

        <div class="auth-sw-v3"><a href="/forgot-password">Forgot password?</a></div>
        <div class="auth-sw-v3"><span data-i18n="auth.noAccount">No account?</span> <a href="/register" data-i18n="auth.createFree">Create one free →</a></div>

        <div style="margin-top:14px;background:#F8FAFC;border-radius:9px;padding:10px 12px;border:.5px solid #E2E8F0;font-size:10px;color:#64748B;line-height:1.6">
          <strong style="color:#1B4332;display:block;margin-bottom:3px" data-i18n="auth.demoAccounts">Demo accounts</strong>
          <span data-i18n="auth.manager">Manager</span>: <strong style="color:#3D8565">manager1@stocklens.local</strong> / pass123<br/>
          <span data-i18n="auth.staff">Staff</span>: <strong style="color:#3D8565">staff1@stocklens.local</strong> / pass123
        </div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/translations.js') }}"></script>
  <script>
    // Password toggle
    let showPw = false;
    document.getElementById('toggle-password').addEventListener('click', () => {
      showPw = !showPw;
      document.getElementById('password').type = showPw ? 'text' : 'password';
      document.getElementById('password-eye').innerHTML = showPw
        ? '<path d="M17.9 17.9A10.4 10.4 0 0 1 12 20C5.5 20 2 12 2 12a18.8 18.8 0 0 1 4.2-5.8"/><path d="M9.9 4.2A9.5 9.5 0 0 1 12 4c6.5 0 10 8 10 8a18.5 18.5 0 0 1-2.1 3.2"/><path d="M14.1 14.1A3 3 0 0 1 9.9 9.9"/><path d="M3 3l18 18"/>'
        : '<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/>';
    });

    // Demo credentials
    document.getElementById('demo-btn').addEventListener('click', () => {
      document.getElementById('email').value = 'manager1@stocklens.local';
      document.getElementById('password').value = 'pass123';
    });

    // Login
    async function doLogin() {
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';

      if (!email || !password) {
        errEl.textContent = t('msg.loginRequired');
        errEl.style.display = 'block';
        return;
      }

      const btn = document.getElementById('login-btn');
      btn.textContent = formatTranslation(t('auth.signingIn'));
      btn.disabled = true;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (res.ok) {
          sessionStorage.setItem('role', data.role);
          sessionStorage.setItem('username', data.username);
          window.location.href = data.onboarding_required ? '/onboarding' : '/dashboard';
        } else {
          errEl.textContent = data.message || t('msg.loginFailed');
          errEl.style.display = 'block';
          btn.textContent = formatTranslation(t('auth.loginSubmit'));
          btn.disabled = false;
        }
      } catch (e) {
        errEl.textContent = t('msg.serverError');
        errEl.style.display = 'block';
        btn.textContent = formatTranslation(t('auth.loginSubmit'));
        btn.disabled = false;
      }
    }

    document.getElementById('login-btn').addEventListener('click', doLogin);
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
