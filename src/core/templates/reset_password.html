<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockLens — Reset Password</title>
  <link rel="icon" href="{{ url_for('static', filename='brand-icon.png') }}" type="image/png" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
</head>
<body>
  <nav class="auth-nav"><a class="hp-logo" href="/"><div class="hp-logo-mark"><img src="{{ url_for('static', filename='brand-icon.png') }}" alt="" /></div><span class="hp-logo-name">Stock<em>Lens</em></span></a></nav>
  <div class="auth-bg">
    <div class="auth-card-v3">
      <h1 class="onb-title" data-i18n="auth.resetTitle">Reset password</h1>
      <div class="fg"><label class="fl" data-i18n="auth.newPassword">New password</label><input class="fi" type="password" id="password" autocomplete="new-password" /></div>
      <div class="fg"><label class="fl" data-i18n="auth.confirmPassword">Confirm password</label><input class="fi" type="password" id="confirm" autocomplete="new-password" /></div>
      <button class="auth-submit-v3" id="reset-btn" data-i18n="auth.updatePassword">Update password</button>
      <p id="reset-msg" style="display:none;font-size:11px;text-align:center;margin-top:8px"></p>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/translations.js') }}"></script>
  <script>
    const token = {{ token|tojson }};
    document.getElementById('reset-btn').addEventListener('click', async () => {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const msg = document.getElementById('reset-msg');
      if (password.length < 8 || password !== confirm) {
        msg.textContent = t('auth.resetValidation');
        msg.style.color = '#DC2626';
        msg.style.display = 'block';
        return;
      }
      const res = await fetch('/api/password/reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ token, password }),
      });
      const data = await res.json();
      msg.textContent = translateServerMessage(data.message) || t('auth.passwordUpdated');
      msg.style.color = res.ok ? '#15803D' : '#DC2626';
      msg.style.display = 'block';
      if (res.ok) setTimeout(() => { window.location.href = '/login'; }, 900);
    });
  </script>
</body>
</html>
