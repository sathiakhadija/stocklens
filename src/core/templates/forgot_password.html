<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockLens — Account Recovery</title>
  <link rel="icon" href="{{ url_for('static', filename='brand-icon.png') }}" type="image/png" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <script>
    document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
  </script>
</head>
<body>
  <nav class="auth-nav">
    <a class="hp-logo" href="/">
      <div class="hp-logo-mark"><img src="{{ url_for('static', filename='brand-icon.png') }}" alt="" /></div>
      <span class="hp-logo-name">Stock<em>Lens</em></span>
    </a>
    <a class="btn btn-out btn-sm" href="/login" data-i18n="auth.backSignIn">Back to sign in</a>
  </nav>

  <div class="auth-bg">
    <div class="auth-card-v3">
      <div class="auth-logo-v3">
        <div class="alm"><img src="{{ url_for('static', filename='brand-icon.png') }}" alt="" /></div>
        <span class="auth-brand">Stock<em>Lens</em></span>
      </div>
      <h1 class="onb-title" data-i18n="auth.recoverTitle">Recover your account</h1>
      <p class="onb-sub" data-i18n="auth.recoverBody">Enter your email and StockLens will show the recovery path for this deployment.</p>
      <div class="fg">
        <label class="fl" data-i18n="auth.email">Email</label>
        <input class="fi" type="email" id="email" placeholder="you@yourshop.com" data-i18n-placeholder="auth.emailPlaceholder" autocomplete="email" />
      </div>
      <button class="auth-submit-v3" id="recover-btn" data-i18n="common.continue">Continue</button>
      <p class="error-msg" id="recovery-msg" style="display:none;font-size:11px;margin-top:8px;text-align:center"></p>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/translations.js') }}"></script>
  <script>
    document.getElementById('recover-btn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim().toLowerCase();
      const msg = document.getElementById('recovery-msg');
      msg.style.display = 'none';
      if (!email) {
        msg.textContent = t('auth.emailRequired');
        msg.style.color = '#DC2626';
        msg.style.display = 'block';
        return;
      }
      const res = await fetch('/api/password/forgot', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ email }),
      });
      const data = await res.json();
      msg.innerHTML = data.reset_url
        ? `${translateServerMessage(data.message)}<br><a href="${data.reset_url}">${t('auth.openResetLink')}</a>`
        : (translateServerMessage(data.message) || t('auth.contactAdminReset'));
      msg.style.color = res.ok ? '#15803D' : '#DC2626';
      msg.style.display = 'block';
    });
  </script>
</body>
</html>
